apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: code-runner-redis-data
  namespace: code-runner-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-runner-redis
  namespace: code-runner-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-runner-redis
  template:
    metadata:
      labels:
        app: code-runner-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --dir
            - /data
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: code-runner-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: code-runner-redis
  namespace: code-runner-system
spec:
  type: ClusterIP
  selector:
    app: code-runner-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
